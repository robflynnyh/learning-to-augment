checkpointing:
  asr_model: /store/store5/data/acp21rjf_checkpoints/l2augment/asr/step_105360.pt

training:
  device: cuda
  random_seed: 1234
  batch_size: 84
  epochs: 100

evaluation:
  rollout_setting: policy
  split: test
  use_cer: false
  epochs: 1
  augmentation_config:
    repeats: 1
    use_random: true
  optim_args:
    lr: 1.0e-06
  save_path: /exp/exp4/acp21rjf/learning-to-augment/exp/results/historical_results/RFM_segmented/tedlium_lr1e-6.txt

policy:
  lr: 0.0001
  class: FrequencyMaskingRanker
