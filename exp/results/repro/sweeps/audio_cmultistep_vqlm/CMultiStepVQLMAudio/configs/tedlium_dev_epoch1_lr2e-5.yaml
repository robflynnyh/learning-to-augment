checkpointing:
  asr_model: /store/store5/data/acp21rjf_checkpoints/l2augment/asr/step_105360.pt

training:
  device: 'cuda'
  random_seed: 123456
  batch_size: 1
  epochs: 100
  model_save_path: /store/store5/data/acp21rjf_checkpoints/l2augment/models/CMultiStepMLM/curbest.pt
  tmp_model_save_path: /store/store5/data/acp21rjf_checkpoints/l2augment/models/CMultiStepMLM/curbest.pt
  max_steps: 10000
  prefetch_factor: null
  num_workers: 0

evaluation:
  id: 'ROB-80-tedlium-dev-CMultiStepVQLMAudio-epoch1-lr2e-5-repeat1'
  dataset: 'tedlium'
  split: 'dev'
  use_cer: false
  epochs: 1
  augmentation_config:
    seed: 123456
  optim_args:
    lr: 2e-5
  save_path: /exp/exp4/acp21rjf/symphony-workspaces-learning-to-augment/ROB-80/exp/results/repro/sweeps/audio_cmultistep_vqlm/CMultiStepVQLMAudio/tedlium_dev_epoch1_lr2e-5.txt

policy:
  lr: 1e-3
  class: ConditionalMultiStepMaskGenerator
  config:
    codebook_size: 2048
    hidden_dim: 512
    embedding_dim: 256
    decoder_layers: 4
    default_conditioning_reward: 1.0
    condition_on_audio: true
    use_signal_inputs: false
    audio_vae_state_dict_path: /store/store5/data/acp21rjf_checkpoints/l2augment/models/autoenc_audio/model_gpu.pt
    audio_vae_config:
      latent_dim: 256
      use_vq: false
      norm_type: 'bn'
    mask_vae_state_dict_path: /store/store5/data/acp21rjf_checkpoints/l2augment/models/bvae/bvae_USINGTHISFORNOW_2048gpu.pt
    mask_vae_config:
      latent_dim: 128
      codebook_size: 2048
      use_vq: true
