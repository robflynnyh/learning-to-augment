checkpointing:
  asr_model: /store/store5/data/acp21rjf_checkpoints/l2augment/asr/step_105360.pt

training:
  device: cpu
  random_seed: 1234
  batch_size: 84
  epochs: 100
  model_save_path: /store/store5/data/acp21rjf_checkpoints/l2augment/ufmr/mseloss/model.pt
  tmp_model_save_path: /store/store5/data/acp21rjf_checkpoints/l2augment/ufmr/mseloss/model.pt

evaluation:
  rollout_setting: policy
  split: test
  use_cer: false
  epochs: 1
  augmentation_config:
    repeats: 15
    use_random: false
  optim_args:
    lr: 1e-6
  save_path: exp/results/repro/policy/UFMR_segmented/tedlium_lr{grid_label:evaluation.optim_args.lr}.txt

policy:
  lr: 1e-4
  class: UnconditionalFrequencyMaskingRanker

grid:
  name: ufmr_segmented_repro_tedlium_test
  id_template: "tedlium_lr{grid_label:evaluation.optim_args.lr}"
  axes:
    evaluation.optim_args.lr:
      - value: 1e-6
        label: "1e-6"
      - value: 8e-6
        label: "8e-6"
