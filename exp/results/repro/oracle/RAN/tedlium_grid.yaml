checkpointing:
  asr_model: /store/store5/data/acp21rjf_checkpoints/l2augment/asr/step_105360.pt

training:
  device: cpu
  random_seed: 1234
  batch_size: 84
  epochs: 100

evaluation:
  rollout_setting: search
  search_repeats: 1
  split: test
  use_cer: false
  epochs: 1
  augmentation_config:
    repeats: 1
    use_random: true
  optim_args:
    lr: 3e-5
    single_step_lr: 2e-1
  save_path: exp/results/repro/oracle/RAN/tedlium_lr{grid_label:evaluation.optim_args.lr}_searchlr{grid_label:evaluation.optim_args.single_step_lr}.txt

policy:
  lr: 1e-4
  class: AdditivePolicy

grid:
  name: random_additive_repro_oracle_tedlium_test
  combine: product
  id_template: "tedlium_lr{grid_label:evaluation.optim_args.lr}_searchlr{grid_label:evaluation.optim_args.single_step_lr}_repeats{evaluation.search_repeats}"
  axes:
    evaluation.search_repeats: [1, 2, 3, 4, 5, 10, 20, 50]
  cases:
    - id: lr3e-5_searchlr2e-1
      values:
        evaluation.optim_args.lr:
          value: 3e-5
          label: "3e-5"
        evaluation.optim_args.single_step_lr:
          value: 2e-1
          label: "2e-1"
