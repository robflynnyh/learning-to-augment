checkpointing:
  asr_model: /store/store5/data/acp21rjf_checkpoints/l2augment/asr/step_105360.pt

training:
  device: cuda
  random_seed: 1234
  batch_size: 84
  epochs: 100
  model_save_path: /store/store5/data/acp21rjf_checkpoints/l2augment/models/UMLM/modelgpu.pt
  tmp_model_save_path: /store/store5/data/acp21rjf_checkpoints/l2augment/models/UMLM/modelgpu.pt

evaluation:
  rollout_setting: search
  search_repeats: 1
  split: test
  use_cer: false
  epochs: 1
  augmentation_config:
    repeats: 1
    use_random: true
  optim_args:
    lr: 1e-5
    single_step_lr: 2e-1
  save_path: exp/results/repro/oracle/UVQLM/tedlium_lr{grid_label:evaluation.optim_args.lr}_searchlr{grid_label:evaluation.optim_args.single_step_lr}.txt

policy:
  lr: 6e-4
  class: UnconditionalMaskGenerator
  config:
    mask_vae_state_dict_path: /store/store5/data/acp21rjf_checkpoints/l2augment/models/bvae/bvae_USINGTHISFORNOW_2048gpu.pt
    mask_vae_config:
      latent_dim: 128
      codebook_size: 2048
      use_vq: true

grid:
  name: uvqlm_repro_oracle_tedlium_test
  combine: product
  id_template: "tedlium_lr{grid_label:evaluation.optim_args.lr}_searchlr{grid_label:evaluation.optim_args.single_step_lr}_repeats{evaluation.search_repeats}"
  axes:
    evaluation.search_repeats: [1, 2, 3, 4, 5, 10, 20, 50]
  cases:
    - id: lr1e-5_searchlr2e-1
      values:
        evaluation.optim_args.lr:
          value: 1e-5
          label: "1e-5"
        evaluation.optim_args.single_step_lr:
          value: 2e-1
          label: "2e-1"
    - id: lr3e-5_searchlr2e-1
      values:
        evaluation.optim_args.lr:
          value: 3e-5
          label: "3e-5"
        evaluation.optim_args.single_step_lr:
          value: 2e-1
          label: "2e-1"
    - id: lr1e-4_searchlr2e-1
      values:
        evaluation.optim_args.lr:
          value: 1e-4
          label: "1e-4"
        evaluation.optim_args.single_step_lr:
          value: 2e-1
          label: "2e-1"
    - id: lr6e-5_searchlr2e-1
      values:
        evaluation.optim_args.lr:
          value: 6e-5
          label: "6e-5"
        evaluation.optim_args.single_step_lr:
          value: 2e-1
          label: "2e-1"
