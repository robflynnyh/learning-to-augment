checkpointing:
  asr_model: "/store/store5/data/acp21rjf_checkpoints/spotify/rotary_pos_6l_256d_seq_sched/n_seq_sched_2048_rp_1/step_105360.pt"

plasticity:
  # Main ROB-186 runs adapt every non-fused attention out_proj layer. For a
  # single-layer smoke/debug run, override this list explicitly.
  target_modules:
    - layers.0.attend.fn.out_proj
    - layers.1.attend.fn.out_proj
    - layers.2.attend.fn.out_proj
    - layers.3.attend.fn.out_proj
    - layers.4.attend.fn.out_proj
    - layers.5.attend.fn.out_proj
  token_dim: 128
  comm_dim: 128
  update_rank: 1
  max_fast_rank: 4
  max_eta: 1.0e-4
  default_rho: 0.95
  max_fast_norm_ratio: 1.0e-3

eggroll:
  num_candidates: 32
  sigma: 1.0e-3
  antithetic: true
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 0.0

rollout:
  # Keep N=32 while restoring the B*N/2 per-GPU stream count used by the
  # successful B=8/N=8 two-GPU smoke: 2 recordings * 16 candidates = 32.
  batch_size_recordings: 2
  chunk_size_frames: 2048
  chunk_overlap_frames: 0
  decode_mode: causal_chunk
  pass_lengths: false
  reward_eps: 1.0e-8
  progress_log_every_chunks: 10
  microbatch_candidates: null
  # Keep the default run on one allocated GPU. The threaded secondary-CUDA
  # shard path is currently pathological in the LCASR rollout stack; the
  # primary-device N=32/B=2 path keeps the validated 64-stream workload.
  devices:
    - cuda:0

training:
  dataset: tedlium
  require_long_form_recordings: true
  allow_segmented_dataset_for_debug: false
  split: train
  device: cuda
  dtype: bfloat16
  seed: 0
  num_steps: 10000
  checkpoint_every: 500
  keep_last_checkpoints: 3
  log_every: 1
  checkpoint_dir: exp/results/plasticity_eggroll/checkpoints
  model_save_path: exp/results/plasticity_eggroll/checkpoints/latest.pt
  summary_path: exp/results/plasticity_eggroll/OUTCOME.md
  save_optimizer_state: true
  resume: false
  wandb_enabled: true
  wandb_project: l2augment
  wandb_name: rob186-plasticity-eggroll
  wandb_group: rob186-plasticity-eggroll
  wandb_mode: online
