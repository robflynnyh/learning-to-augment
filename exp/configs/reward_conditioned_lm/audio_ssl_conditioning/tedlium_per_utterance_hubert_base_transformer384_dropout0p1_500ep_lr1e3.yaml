  save_path: exp/results/repro/reward_conditioned_lm/audio_ssl_conditioning/rob132_hubert_base_transformer384/tedlium_dev_eval_hubert_base_transformer384_dropout0p1_500ep_lr1e3.txt

collate_function: AudioRewardConditionedMaskLM
dataset_class: AudioRewardConditionedMaskLMDataset

dataset:
  reward_metric: wer
  normalization: per_utterance_minmax
  degenerate_range_eps: 1e-6
  degenerate_value: 0.5
  ssl_feature_mode: on_the_fly
  ssl_feature_alignment: native
  ssl_bundle: HUBERT_BASE
  ssl_device: cuda
  tedlium_base: /store/store4/data/TEDLIUM_release-3/legacy

