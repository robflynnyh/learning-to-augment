checkpointing:
  asr_model: /store/store5/data/acp21rjf_checkpoints/spotify/rotary_pos_6l_256d_seq_sched/n_seq_sched_2048_rp_1/step_105360.pt

training:
  device: cuda
  random_seed: 123456
  batch_size: 2
  start_epoch: 100
  epochs: 101
  tolerance: 1
  max_steps: 0
  num_workers: 1
  prefetch_factor: 2
  wandb_project: l2augment
  wandb_mode: disabled
  resume_model_path: /store/store5/data/acp21rjf_checkpoints/l2augment/models/reward_conditioned_mask_lm/no_audio_tedlium_per_utterance.pt
  model_save_path: exp/results/repro/reward_conditioned_lm/no_audio_conditioning/smoke/no_audio_reward_conditioned_mask_lm_resume100_500ep_lr1e3_smoke.pt
  tmp_model_save_path: exp/results/repro/reward_conditioned_lm/no_audio_conditioning/smoke/no_audio_reward_conditioned_mask_lm_resume100_500ep_lr1e3_smoke_tmp.pt

evaluation:
  id: ROB-117-reward-conditioned-mask-lm-tedlium-dev-resume100-500ep-lr1e3-smoke
  dataset: tedlium
  split: dev
  rollout_fn: multistep
  use_cer: false
  epochs: 1
  augmentation_config:
    conditioning_reward: 1.0
    sample: true
  optim_args:
    lr: 1e-5
  save_path: exp/results/repro/reward_conditioned_lm/no_audio_conditioning/tedlium_dev_eval_resume100_500ep_lr1e3_smoke.txt

collate_function: RewardConditionedMaskLM
dataset_class: RewardConditionedMaskLMDataset

dataset:
  reward_metric: wer
  normalization: per_utterance_minmax
  degenerate_range_eps: 1e-6
  degenerate_value: 0.5

policy:
  lr: 1e-3
  class: RewardConditionedMaskLM
  config:
    hidden_dim: 256
    default_conditioning_reward: 1.0
    reward_encoder: timestep
    sample_generation: true
    mask_vae_state_dict_path: /store/store5/data/acp21rjf_checkpoints/l2augment/models/bvae/bvae_USINGTHISFORNOW_2048gpu.pt
    mask_vae_config:
      latent_dim: 128
      codebook_size: 2048
      use_vq: true

generation:
  save_dir: /store/store4/data/l2augment_rollout_uvqmlm
  train_max_files: 1
  dev_max_files: 1
